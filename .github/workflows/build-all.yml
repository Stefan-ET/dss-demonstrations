name: Build DSS Standalone for all platforms

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-all:
    runs-on: ubuntu-latest   # no native compilation needed — plain Java + zip/tar packaging works on any OS
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build dss-standalone-app
        run: mvn -q clean install -pl dss-standalone-app -am -DskipTests=true

      - name: Build dss-standalone-app-package (Windows default + Linux + Mac)
        run: mvn -q clean install -pl dss-standalone-app-package -am -DskipTests=true -P linux,mac

      - name: Upload all platform packages
        uses: actions/upload-artifact@v4
        with:
          name: dss-standalone-all-platforms
          path: |
            dss-standalone-app-package/target/*complete*.zip
            dss-standalone-app-package/target/*minimal*.zip
            dss-standalone-app-package/target/*linux*.tar.gz
            dss-standalone-app-package/target/*mac*.tar.gz
            
